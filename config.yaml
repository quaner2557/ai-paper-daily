# 研究方向关键词（用于相关性评分）
keywords:
  - recommendation
  - recommender system
  - search
  - information retrieval
  - ranking
  - learning to rank
  - matching
  - query understanding
  - semantic search
  - vector search
  - embedding
  - representation learning
  - personalization
  - collaborative filtering
  - reinforcement learning
  - RLHF
  - large language model
  - LLM
  - generative AI
  - retrieval augmented generation
  - RAG
  - knowledge graph
  - multi-modal
  - computer vision
  - NLP
  - natural language processing

# arXiv 分类（关注的领域）
categories:
  - cs.IR      # 信息检索
  - cs.LG      # 机器学习
  - cs.AI      # 人工智能
  - cs.CL      # 计算语言学/NLP
  - cs.DB      # 数据库
  - cs.SE      # 软件工程
  - cs.DC      # 分布式计算

# 输出配置
output:
  directory: ./output
  max_papers: 50
  language: zh  # zh 或 en

# 大模型配置
llm:
  temperature: 0.3
  max_tokens: 2000
  timeout: 60
